<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Add Course</h1>
    <form action="{{url_for('add_course')}}" method="POST">
      <div>
        <label for="course_title">Title:</label>
        <input
          type="text"
          name="title"
          id="course_title"
          required
        /><br /><br />
      </div>
      <div>
        <label for="course_code">Course Code:</label>
        <input type="text" name="code" id="course_code" required />
      </div>
      <button>Add</button>
    </form>
  </body>
</html>
