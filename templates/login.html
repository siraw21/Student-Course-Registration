{% extends 'base.html' %} {% block title %} <title>Login</title> {% endblock %}
{% block content %}
<div>
  <h1>Login</h1>
  <form action="{{url_for('auth.login')}}" method="POST">
    {{ form.hidden_tag()}} {{ form.full_name.label}} {{ form.full_name}} <br />
    {{ form.password.label}} {{ form.password }} <br />
    {{ form.submit()}}
  </form>
</div>
{% endblock %}
