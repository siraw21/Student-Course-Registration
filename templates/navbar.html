<div
  style="
    background-color: #22226e;
    padding: 1rem;
    color: white;
    list-style-type: none;

    display: flex;
    justify-content: space-between;
    align-items: center;
  "
>
  <div class="brand">Student Course Registration</div>
  <nav>
    <ul
      style="
        display: flex;
        list-style-type: none;
        gap: 1rem;
        text-decoration: none;
      "
    >
      <li><a style="color: white" href="{{url_for('home')}}">Home</a></li>

      {% if session.get('username') %}
      <li>
        <a style="color: white" href="{{url_for('dashboard')}}">Dashboard</a>
      </li>
      <li>
        <a style="color: white" href="{{url_for('logout')}}">Logout</a>
      </li>
      {% else %}
      <li><a style="color: white" href="{{url_for('login')}}">Login</a></li>
      <li>
        <a style="color: white" href="{{url_for('register')}}">Register</a>
      </li>
      {% endif %}
    </ul>
  </nav>
</div>
