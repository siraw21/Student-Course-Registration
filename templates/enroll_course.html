{% extends 'base.html' %} {% block title %} <title>Enroll</title> {% endblock %}
{% block content %}
<h1>Welcome, Enroll in Course</h1>

<form action="{{url_for('enroll')}}" method="GET">
  <select name="course_id">
    {% for course in result %}
    <option value="{{course.id}}">{{course.title}}</option>
    {% endfor %}
  </select>
  <button>go</button>
</form>
{% endblock %}
